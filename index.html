<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kỹ năng làm việc nhóm và học tập</title>
    <style>
        body { 
            display: flex; 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            height: 100vh; 
            overflow: hidden; /* Chống cuộn trang tổng, chỉ cuộn iframe */
        }
        /* Cột Menu bên trái */
        .sidebar { 
            width: 250px; 
            background-color: #2c3e50; 
            color: white; 
            display: flex; 
            flex-direction: column; 
        }
        .sidebar h2 { 
            text-align: center; 
            font-size: 18px; 
            padding: 20px 10px; 
            margin: 0; 
            background-color: #1a252f; 
        }
        .sidebar button { 
            background: none; 
            color: white; 
            border: none; 
            padding: 15px 20px; 
            text-align: left; 
            font-size: 16px; 
            cursor: pointer; 
            border-bottom: 1px solid #34495e; 
            transition: 0.3s;
        }
        .sidebar button:hover, .sidebar button.active { 
            background-color: #34495e; 
            border-left: 4px solid #3498db; 
        }
        /* Khu vực hiển thị nội dung */
        .content { 
            flex-grow: 1; 
            background-color: #ecf0f1; 
        }
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
        }
    </style>
</head>
<body>

    <!-- Khung Menu -->
    <div class="sidebar">
        <h2>Menu Môn Học</h2>
        <!-- Thay thế các URL dưới đây bằng URL trang web thực tế của thầy -->
        <button class="tab-btn active" onclick="openTab(this, 'https://vi.wikipedia.org/wiki/K%E1%BB%B9_n%C3%A2ng_m%E1%BB%81m')">1. Tổng quan môn học</button>
        <button class="tab-btn" onclick="openTab(this, 'URL_TRANG_CUA_THAY_2')">2. Đánh giá nhóm (Rubric)</button>
        <button class="tab-btn" onclick="openTab(this, 'URL_TRANG_CUA_THAY_3')">3. Bài tập Flashcard</button>
        <button class="tab-btn" onclick="openTab(this, 'URL_TRANG_CUA_THAY_4')">4. Bảng phân công nhiệm vụ</button>
    </div>

    <!-- Khung hiển thị nội dung trang web con -->
    <div class="content">
        <!-- Đặt src mặc định là trang đầu tiên thầy muốn sinh viên thấy -->
        <iframe id="mainFrame" src="https://vi.wikipedia.org/wiki/K%E1%BB%B9_n%C3%A2ng_m%E1%BB%81m"></iframe>
    </div>

    <script>
        function openTab(btnElement, url) {
            // 1. Đổi đường dẫn của iframe thành url mới
            document.getElementById('mainFrame').src = url;

            // 2. Xóa trạng thái 'active' của tất cả các nút
            var buttons = document.getElementsByClassName("tab-btn");
            for (var i = 0; i < buttons.length; i++) {
                buttons[i].classList.remove("active");
            }

            // 3. Đánh dấu nút vừa được click là 'active' (để đổi màu nhận diện)
            btnElement.classList.add("active");
        }
    </script>

</body>
</html>
